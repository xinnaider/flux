services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  www:
    image: ghcr.io/xinnaider/flux-frontend:latest
    ports:
      - "80:80"

volumes:
  redis_data:
