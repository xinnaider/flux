name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Go test
        run: go test -v -race -count=1 ./...
        env:
          REDIS_TEST_ADDR: localhost:6379

      - name: Verify Go build
        run: go build -o /dev/null ./cmd/server

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: www/package-lock.json

      - name: Build frontend
        run: |
          cd www
          npm ci
          npm run build

  build-and-deploy:
    name: Build images & deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push flux image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flux:latest
            ghcr.io/${{ github.repository_owner }}/flux:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: www
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flux-frontend:latest
            ghcr.io/${{ github.repository_owner }}/flux-frontend:${{ github.sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            echo "--- Logging in to ghcr.io ---"
            echo "$GH_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "--- Pulling latest compose file ---"
            cd /root/flux
            git fetch origin
            git reset --hard origin/main

            echo "--- Pulling pre-built images ---"
            docker compose pull

            echo "--- Restarting containers ---"
            docker compose up -d --force-recreate --remove-orphans

            echo "--- Pruning stale images ---"
            docker image prune -f

            echo "--- Done ---"
